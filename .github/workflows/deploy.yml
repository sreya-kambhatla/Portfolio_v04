# .github/workflows/deploy.yml
#
# GitHub Actions workflow — runs automatically on every push to main.
#
# What it does:
#   1. Validates HTML (catches broken tags, missing attributes, etc.)
#   2. Checks that all required files exist (index.html, styles.css, script.js)
#   3. Verifies og-image.png is present (social preview)
#   4. Reports pass/fail in the GitHub Actions tab
#
# Why this matters:
#   - Every commit is automatically checked before it goes live
#   - The green checkmark on your repo shows CI/CD awareness
#   - Recruiters who look at your repo see professional engineering practices
#
# Triggered by: push or pull request to main branch
# Runner: ubuntu-latest (GitHub's free Linux VM)

name: Validate & Deploy Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate HTML & Assets
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repo onto the runner VM
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python (needed for the OG image generator)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      # Step 4: Verify all required files exist
      # The `test -f` command returns exit code 1 if file is missing,
      # which fails the workflow and shows a red X on the commit.
      - name: Check required files exist
        run: |
          echo "Checking required files..."
          test -f index.html   && echo "✓ index.html"   || (echo "✗ index.html missing"   && exit 1)
          test -f styles.css   && echo "✓ styles.css"   || (echo "✗ styles.css missing"   && exit 1)
          test -f script.js    && echo "✓ script.js"    || (echo "✗ script.js missing"    && exit 1)
          test -f README.md    && echo "✓ README.md"    || (echo "✗ README.md missing"    && exit 1)

      # Step 5: Regenerate OG image so it's always fresh
      - name: Generate OG social preview image
        run: python generate_og_image.py

      # Step 6: Validate HTML using Python's built-in html.parser
      # A simple structural check — catches unclosed tags and malformed markup
      - name: Validate HTML structure
        run: |
          python - << 'PYEOF'
          from html.parser import HTMLParser
          import sys

          class Validator(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errors = []
                  self.stack  = []
                  # Void elements never have closing tags — skip tracking them
                  self.void   = {'area','base','br','col','embed','hr','img',
                                 'input','link','meta','param','source','track','wbr'}

              def handle_starttag(self, tag, attrs):
                  if tag not in self.void:
                      self.stack.append(tag)

              def handle_endtag(self, tag):
                  if tag in self.void:
                      return
                  if self.stack and self.stack[-1] == tag:
                      self.stack.pop()
                  else:
                      self.errors.append(f"Unexpected </{tag}> — open tags: {self.stack[-3:]}")

          with open('index.html', encoding='utf-8') as f:
              content = f.read()

          v = Validator()
          v.feed(content)

          if v.errors:
              for e in v.errors:
                  print(f"  ERROR: {e}")
              sys.exit(1)
          elif v.stack:
              print(f"  WARNING: Unclosed tags at end of file: {v.stack}")
          else:
              print(f"  HTML structure valid. Parsed successfully.")
          PYEOF

      # Step 7: Check CSS has key selectors (smoke test)
      - name: Smoke-test CSS
        run: |
          python - << 'PYEOF'
          import sys
          with open('styles.css') as f:
              css = f.read()
          required = [':root', '.glass-tile', '.reveal', '.edu-timeline', '.jobs-row', '.stack-outer']
          missing  = [s for s in required if s not in css]
          if missing:
              print(f"Missing CSS selectors: {missing}")
              sys.exit(1)
          print(f"CSS smoke test passed. {len(css):,} chars, all key selectors present.")
          PYEOF

      # Step 8: Check JS has key functions (smoke test)
      - name: Smoke-test JavaScript
        run: |
          python - << 'PYEOF'
          import sys
          with open('script.js') as f:
              js = f.read()
          required = ['CANVAS', 'SCROLL REVEAL', 'QUOTES', 'emailjs']
          missing  = [s for s in required if s not in js]
          if missing:
              print(f"Missing JS sections: {missing}")
              sys.exit(1)
          print(f"JS smoke test passed. {len(js):,} chars, all key sections present.")
          PYEOF

      - name: All checks passed
        run: echo "Portfolio validated successfully — ready to deploy."
